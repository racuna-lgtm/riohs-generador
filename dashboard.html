<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Portal RIOHS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--navy:#1B2E6E;--naranja:#E87722;--gris:#f0f2f7;--texto:#2a2a2a;--muted:#666}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:var(--gris);color:var(--texto);min-height:100vh}
    header{background:var(--navy);color:white;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .header-left{display:flex;align-items:center;gap:.75rem}
    .header-left h1{font-size:1.1rem;font-weight:700}
    .header-left span{color:var(--naranja);font-size:.8rem;display:block;font-weight:400}
    .header-right{display:flex;align-items:center;gap:1rem}
    .usuario-label{font-size:.85rem;color:#aab}
    .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:white;padding:.4rem .9rem;border-radius:5px;font-size:.85rem;cursor:pointer}
    .btn-logout:hover{background:rgba(255,255,255,.1)}
    main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
    .top-bar h2{font-size:1.3rem;color:var(--navy)}
    .top-bar-right{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
    .buscador{padding:.6rem 1rem;border:2px solid #ddd;border-radius:6px;font-size:.95rem;width:220px}
    .buscador:focus{outline:none;border-color:var(--navy)}
    .btn-nuevo{background:var(--naranja);color:white;border:none;padding:.65rem 1.2rem;border-radius:6px;font-size:.95rem;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-nuevo:hover{background:#d06618}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:white;border-radius:8px;padding:1.2rem;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06);border-top:3px solid var(--navy)}
    .stat-card .numero{font-size:2rem;font-weight:700;color:var(--navy)}
    .stat-card .etiqueta{font-size:.8rem;color:var(--muted);margin-top:.2rem}
    .clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
    .cliente-card{background:white;border-radius:10px;padding:0;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;transition:transform .15s,box-shadow .15s}
    .cliente-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
    .card-header{height:6px}
    .card-body{padding:1.2rem 1.5rem 0}
    .card-logo{width:48px;height:32px;border:1px solid #eee;border-radius:4px;overflow:hidden;background:#f8f8f8;display:flex;align-items:center;justify-content:center;margin-bottom:.5rem}
    .card-logo img{width:100%;height:100%;object-fit:contain}
    .card-logo .sin-logo{font-size:.6rem;color:#bbb;text-align:center}
    .cliente-card h3{font-size:1rem;color:var(--navy);margin-bottom:.2rem}
    .cliente-card .rut{font-size:.78rem;color:var(--muted);margin-bottom:.6rem}
    .cliente-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem}
    .tag{background:#f0f2f7;color:var(--navy);font-size:.72rem;padding:.2rem .5rem;border-radius:20px;font-weight:600}
    .card-acciones{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #f0f0f0;margin-top:.5rem}
    .card-btn{padding:.7rem;border:none;background:transparent;cursor:pointer;font-size:.78rem;font-weight:700;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:.3rem}
    .card-btn:hover{background:#f5f5f5}
    .card-btn.primario{color:var(--navy)}
    .card-btn.secundario{color:var(--naranja)}
    .card-btn.editar{color:#555;border-left:1px solid #f0f0f0;border-right:1px solid #f0f0f0}
    .estado-vacio{text-align:center;padding:4rem 2rem;color:var(--muted);display:none}
    .estado-vacio .icono{font-size:3rem;margin-bottom:1rem}
    .estado-vacio h3{margin-bottom:.5rem;color:var(--navy)}
    .loading{text-align:center;padding:3rem;color:var(--muted)}
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <span style="font-size:1.5rem">🛡️</span>
    <div><h1>Más Prevención</h1><span>Portal RIOHS</span></div>
  </div>
  <div class="header-right">
    <span class="usuario-label" id="usuarioLabel">—</span>
    <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</header>

<main>
  <div class="top-bar">
    <h2>Mis Clientes</h2>
    <div class="top-bar-right">
      <input class="buscador" type="text" id="buscador" placeholder="🔍 Buscar cliente..." oninput="filtrar()">
      <button class="btn-nuevo" onclick="irAFicha()">+ Nuevo Cliente</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="numero" id="statTotal">—</div><div class="etiqueta">Clientes activos</div></div>
    <div class="stat-card"><div class="numero" id="statDocs">—</div><div class="etiqueta">RIOHS generados</div></div>
    <div class="stat-card"><div class="numero" id="statMes">—</div><div class="etiqueta">Este mes</div></div>
  </div>

  <div id="loading" class="loading">Cargando clientes...</div>
  <div class="clientes-grid" id="clientesGrid"></div>
  <div class="estado-vacio" id="estadoVacio">
    <div class="icono">📋</div>
    <h3>Sin clientes todavía</h3>
    <p>Agrega tu primer cliente para comenzar a generar RIOHS.</p>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://cayvrsqyjljqnrtsagwq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_JLaCYGFE3fq6b7ecDl0glA_axBuVRZo';
  const{createClient}=supabase;
  const db=createClient(SUPABASE_URL,SUPABASE_KEY);
  let todos=[];

  async function init(){
    const{data:{session}}=await db.auth.getSession();
    if(!session){window.location.href='index.html';return}
    document.getElementById('usuarioLabel').textContent=session.user.email;
    await cargarClientes();await cargarStats();
  }

  async function cargarClientes(){
    const{data,error}=await db.from('clientes').select('*').order('created_at',{ascending:false});
    document.getElementById('loading').style.display='none';
    if(error){console.error(error);return}
    todos=data||[];
    renderClientes(todos);
    document.getElementById('statTotal').textContent=todos.length;
  }

  async function cargarStats(){
    const inicio=new Date();inicio.setDate(1);inicio.setHours(0,0,0,0);
    const{count:total}=await db.from('documentos_riohs').select('*',{count:'exact',head:true});
    const{count:mes}=await db.from('documentos_riohs').select('*',{count:'exact',head:true}).gte('created_at',inicio.toISOString());
    document.getElementById('statDocs').textContent=total||0;
    document.getElementById('statMes').textContent=mes||0;
  }

  function renderClientes(clientes){
    const grid=document.getElementById('clientesGrid');
    const vacio=document.getElementById('estadoVacio');
    if(!clientes.length){grid.innerHTML='';vacio.style.display='block';return}
    vacio.style.display='none';
    grid.innerHTML=clientes.map(c=>`
      <div class="cliente-card">
        <div class="card-header" style="background:linear-gradient(to right,${c.color_primario||'#1B2E6E'},${c.color_secundario||'#E87722'})"></div>
        <div class="card-body">
          ${c.logo_url
            ? `<div class="card-logo"><img src="${c.logo_url}" alt="logo"></div>`
            : `<div class="card-logo"><span class="sin-logo">sin logo</span></div>`
          }
          <h3>${c.razon_social}</h3>
          <div class="rut">${c.rut||'Sin RUT'} · ${c.region||'Sin región'}</div>
          <div class="cliente-meta">
            <span class="tag">📦 ${c.rubro}</span>
            ${c.num_trabajadores?`<span class="tag">👷 ${c.num_trabajadores} trab.</span>`:''}
            ${c.tiene_sindicato?'<span class="tag">🤝 Sindicato</span>':''}
          </div>
        </div>
        <div class="card-acciones">
          <button class="card-btn primario" onclick="generarRIOHS('${c.id}','nuevo')">➕ RIOHS Nuevo</button>
          <button class="card-btn editar" onclick="irAFicha('${c.id}')">✏️ Editar ficha</button>
          <button class="card-btn secundario" onclick="generarRIOHS('${c.id}','auditoria')">🔍 Auditar</button>
        </div>
      </div>`).join('');
  }

  function filtrar(){
    const q=document.getElementById('buscador').value.toLowerCase();
    renderClientes(todos.filter(c=>c.razon_social.toLowerCase().includes(q)||(c.rut||'').toLowerCase().includes(q)||(c.rubro||'').toLowerCase().includes(q)));
  }

  function irAFicha(id=null){window.location.href=id?`ficha-cliente.html?id=${id}`:'ficha-cliente.html'}
  function generarRIOHS(id,tipo){window.location.href=`generar.html?cliente=${id}&tipo=${tipo}`}
  async function cerrarSesion(){await db.auth.signOut();window.location.href='index.html'}

  init();
</script>
</body>
</html>
