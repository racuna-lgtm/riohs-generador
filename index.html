<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Más Prevención - Generador RIOHS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1B2E6E, #4A90E2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 90%;
        }
        
        h1 {
            color: #1B2E6E;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .client-form {
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        button {
            background: #E87722;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        
        button:hover {
            background: #d66a1a;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }
        
        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Más Prevención - Generador RIOHS</h1>
        
        <form class="client-form" onsubmit="generarRIOHS(event)">
            <div class="form-group">
                <label for="empresa">Empresa:</label>
                <input type="text" id="empresa" required placeholder="Nombre de la empresa">
            </div>
            
            <div class="form-group">
                <label for="rubro">Rubro:</label>
                <input type="text" id="rubro" required placeholder="Ej: Retail/Comercio, Construcción, etc.">
            </div>
            
            <button type="submit" id="generateBtn">Generar RIOHS</button>
        </form>
        
        <div class="result" id="result">
            <h3>RIOHS Generado:</h3>
            <div id="content"></div>
            <button onclick="descargarRIOHS()">Descargar Word</button>
        </div>
        
        <div class="error" id="error"></div>
    </div>

    <script>
        let lastContent = '';
        
        async function generarRIOHS(event) {
            event.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Generando...';
            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            
            const empresa = document.getElementById('empresa').value;
            const rubro = document.getElementById('rubro').value;
            
            try {
                const response = await fetch('/api/generarRIOHS', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        cliente: { empresa, rubro },
                        bloque: { id: 1, nombre: 'RIOHS Completo' }
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                lastContent = data.contenido;
                
                document.getElementById('content').innerHTML = `<pre>${data.contenido}</pre>`;
                resultDiv.style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generar RIOHS';
            }
        }
        
        function descargarRIOHS() {
            if (!lastContent) return;
            
            const blob = new Blob([lastContent], { type: 'application/msword' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'RIOHS-generado.doc';
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
