<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Más Prevención · Portal RIOHS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #1B2E6E;
      --naranja: #E87722;
      --gris-claro: #f4f5f7;
      --texto: #2a2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, #2d4a9e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area .escudo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .logo-area h1 {
      color: var(--navy);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .logo-area p {
      color: var(--naranja);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider {
      height: 3px;
      background: linear-gradient(to right, var(--navy), var(--naranja));
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--navy);
    }

    .btn-ingresar {
      width: 100%;
      background: var(--naranja);
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-ingresar:hover { background: #d06618; }
    .btn-ingresar:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .footer-text {
      text-align: center;
      font-size: 0.75rem;
      color: #999;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="escudo">🛡️</div>
      <h1>Más Prevención</h1>
      <p>Portal RIOHS</p>
    </div>
    <div class="divider"></div>

    <div class="error-msg" id="errorMsg"></div>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="usuario@empresa.cl">

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">

    <button class="btn-ingresar" id="btnIngresar" onclick="iniciarSesion()">
      Ingresar al Portal
    </button>

    <p class="footer-text">Acceso restringido · Solo personal autorizado</p>
  </div>

  <script>
    // ⚙️ CONFIGURACIÓN SUPABASE — reemplaza con tus credenciales
const SUPABASE_URL = 'https://cayvrsqyjljqnrtsagwq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JLaCYGFE3fq6b7ecDl0glA_axBuVRZo';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Si ya hay sesión activa, ir directo al dashboard
    async function verificarSesion() {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    }
    verificarSesion();

    async function iniciarSesion() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnIngresar');
      const errorMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        mostrarError('Por favor completa todos los campos.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errorMsg.style.display = 'none';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        mostrarError('Correo o contraseña incorrectos.');
        btn.disabled = false;
        btn.textContent = 'Ingresar al Portal';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    function mostrarError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Enter para ingresar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') iniciarSesion();
    });
  </script>
</body>
</html>
